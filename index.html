<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Photo Gallery</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>📸 Infinite Photo Gallery</h1>
        <p>Explore stunning photos from around the world</p>
    </header>

    <div class="search-container">
        <input
            type="text"
            id="searchInput"
            placeholder="Search photos..."
        >
    </div>

    <div id="errorMessage"></div>

    <div id="gallery" class="gallery"></div>

    <div id="loader" class="loader"></div>

    <div id="sentinel"></div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">

        <button id="closeBtn" class="close-btn">
            ✕
        </button>

        <button id="prevBtn" class="nav-btn prev-btn">
            ❮
        </button>

        <img id="lightboxImg" src="" alt="Preview">

        <button id="nextBtn" class="nav-btn next-btn">
            ❯
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
